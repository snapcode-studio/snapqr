<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SnapMenu Widget</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        scrollbar-width: none;
      }
      body::-webkit-scrollbar {
        display: none;
      }
      .widget-container {
        padding: 20px;
        border-radius: 20px;
        background: rgba(12, 12, 16, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        box-sizing: border-box;
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .pitch-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10, 10, 14, 0.75);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        z-index: 10;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        border-radius: 20px;
      }
      .pitch-overlay.active {
        display: flex;
      }
      .pitch-overlay h3 {
        margin: 0 0 10px 0;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .pitch-overlay p {
        margin: 0 0 22px 0;
        font-size: 0.92rem;
        opacity: 0.85;
        max-width: 540px;
        line-height: 1.45;
      }
      .pitch-btn {
        background: linear-gradient(135deg, #c62828 0%, #b71c1c 100%);
        color: white;
        text-decoration: none;
        padding: 13px 28px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
        box-shadow: 0 6px 20px rgba(183, 28, 28, 0.4);
      }
      .pitch-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(229, 57, 53, 0.5);
        background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
      }
      .widget-header {
        font-weight: 700;
        font-size: 1.25rem;
        margin-bottom: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        letter-spacing: -0.01em;
      }
      #widgetList {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin: 8px 0 14px 0;
        flex-grow: 1;
      }
      .widget-item {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 14px 16px;
        transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .widget-item:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.18);
      }
      .widget-item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 6px;
      }
      .widget-item-name {
        font-weight: 600;
        font-size: 0.95rem;
        line-height: 1.3;
      }
      .widget-item-price {
        font-family: 'Geist Mono', monospace;
        font-weight: 600;
        color: #d4af37;
        font-size: 0.9rem;
        white-space: nowrap;
      }
      .widget-item-desc {
        font-size: 0.8rem;
        opacity: 0.65;
        line-height: 1.35;
      }
      .widget-footer {
        text-align: center;
        margin-top: 10px;
        font-size: 0.75rem;
        opacity: 0.7;
      }
      .widget-footer a {
        color: inherit;
        font-weight: 700;
      }
      .btn-full-menu {
        display: block;
        width: 100%;
        padding: 11px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        text-align: center;
        text-decoration: none;
        margin-top: 10px;
        transition: background 0.3s, border-color 0.3s;
        cursor: pointer;
      }
      .btn-full-menu:hover {
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>
  <body id="widgetBody">
    <div class="widget-container" id="widgetContainer">
      <div id="pitchOverlay" class="pitch-overlay">
        <h3 id="pitchTitle">Przejmij ten link i skonfiguruj menu!</h3>
        <p id="pitchDesc">Jesteś właścicielem? Skonfiguruj cyfrowe menu dla swojej firmy w 2 minuty.</p>
        <a href="/dashboard.html" target="_blank" id="pitchBtn" class="pitch-btn">Skonfiguruj menu dla swojej firmy</a>
      </div>
      
      <div>
        <div class="widget-header">
          <span id="widgetTitle">Nasze Menu</span>
        </div>
        <div id="widgetLoading" style="text-align:center; padding:20px; opacity:0.5;">Ładowanie...</div>
        <div id="widgetList"></div>
      </div>
      
      <div>
        <a href="#" id="fullMenuLink" target="_blank" class="btn-full-menu" style="display:none;">Zobacz pełne menu</a>
        <div class="widget-footer">
          Powered by <a href="https://snapmenu.getsnap.space" target="_blank">SnapMenu</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/widget.js"></script>
  </body>
</html>
