<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SnapMenu Widget</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        scrollbar-width: none;
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      body::-webkit-scrollbar {
        display: none;
      }
      .widget-container {
        padding: 16px 20px;
        background: transparent;
        color: #fff;
        box-sizing: border-box;
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .pitch-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10, 10, 14, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        z-index: 10;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        border-radius: 18px;
      }
      .pitch-overlay.active {
        display: flex;
      }
      .pitch-badge {
        display: inline-block;
        padding: 4px 12px;
        background: rgba(212, 175, 55, 0.15);
        border: 1px solid rgba(212, 175, 55, 0.3);
        color: #e5b842;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .pitch-overlay h3 {
        margin: 0 0 10px 0;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: #fff;
      }
      .pitch-overlay p {
        margin: 0 0 20px 0;
        font-size: 0.9rem;
        opacity: 0.8;
        max-width: 500px;
        line-height: 1.45;
      }
      .pitch-btn {
        background: linear-gradient(135deg, #d4af37 0%, #aa841c 100%);
        color: #000;
        text-decoration: none;
        padding: 12px 26px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        transition: transform 0.25s, box-shadow 0.25s;
        box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
      }
      .pitch-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
      }
      .widget-header {
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .widget-title-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .widget-live-dot {
        width: 8px;
        height: 8px;
        background-color: #38ef7d;
        border-radius: 50%;
        box-shadow: 0 0 10px #38ef7d;
      }
      .widget-title {
        font-weight: 700;
        font-size: 1.2rem;
        letter-spacing: -0.01em;
      }
      .widget-filters {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        margin-bottom: 10px;
        scrollbar-width: none;
      }
      .widget-filters::-webkit-scrollbar {
        display: none;
      }
      .filter-chip {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.75);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.25s ease;
      }
      .filter-chip:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .filter-chip.active {
        background: linear-gradient(135deg, rgba(212, 175, 55, 0.25) 0%, rgba(212, 175, 55, 0.1) 100%);
        border-color: rgba(212, 175, 55, 0.5);
        color: #f0c75e;
        font-weight: 600;
      }
      #widgetList {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin: 4px 0 12px 0;
        flex-grow: 1;
      }
      .widget-item {
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 14px 16px;
        transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .widget-item:hover {
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(212, 175, 55, 0.35);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }
      .widget-item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 6px;
      }
      .widget-item-name {
        font-weight: 600;
        font-size: 0.95rem;
        line-height: 1.3;
        color: #ffffff;
      }
      .widget-item-price {
        font-family: 'Geist Mono', monospace;
        font-weight: 600;
        background: rgba(212, 175, 55, 0.12);
        border: 1px solid rgba(212, 175, 55, 0.3);
        color: #e5b842;
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 0.85rem;
        white-space: nowrap;
      }
      .widget-item-desc {
        font-size: 0.8rem;
        opacity: 0.65;
        line-height: 1.35;
      }
      .item-badge-group {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .item-badge {
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.85);
      }
      .item-badge.wege {
        background: rgba(46, 125, 50, 0.2);
        border-color: rgba(76, 175, 80, 0.4);
        color: #81c784;
      }
      .item-badge.gf {
        background: rgba(255, 152, 0, 0.18);
        border-color: rgba(255, 152, 0, 0.35);
        color: #ffb74d;
      }
      .item-badge.spicy {
        background: rgba(211, 47, 47, 0.2);
        border-color: rgba(229, 57, 53, 0.4);
        color: #e57373;
      }
      .widget-footer {
        text-align: center;
        margin-top: 8px;
        font-size: 0.75rem;
        opacity: 0.6;
      }
      .widget-footer a {
        color: inherit;
        font-weight: 700;
        text-decoration: none;
      }
      .widget-footer a:hover {
        text-decoration: underline;
      }
      .btn-full-menu {
        display: block;
        width: 100%;
        padding: 11px;
        background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.05) 100%);
        border: 1px solid rgba(212, 175, 55, 0.35);
        border-radius: 50px;
        color: #f5cf68;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        text-align: center;
        text-decoration: none;
        margin-top: 10px;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .btn-full-menu:hover {
        background: linear-gradient(135deg, #d4af37 0%, #aa841c 100%);
        color: #000000;
        box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
        border-color: transparent;
      }
    </style>
  </head>
  <body id="widgetBody">
    <div class="widget-container" id="widgetContainer">
      <div id="pitchOverlay" class="pitch-overlay">
        <span class="pitch-badge">SNAPMENU DIGITAL</span>
        <h3 id="pitchTitle">Przejmij ten link i skonfiguruj menu!</h3>
        <p id="pitchDesc">Jesteś właścicielem? Skonfiguruj cyfrowe menu dla swojej firmy w 2 minuty.</p>
        <a href="/dashboard.html" target="_blank" id="pitchBtn" class="pitch-btn">Skonfiguruj menu dla swojej firmy</a>
      </div>
      
      <div>
        <div class="widget-header">
          <div class="widget-title-wrapper">
            <div class="widget-live-dot"></div>
            <span id="widgetTitle" class="widget-title">Nasze Menu</span>
          </div>
        </div>

        <div class="widget-filters" id="widgetFilters" style="display: none;">
          <button class="filter-chip active" data-filter="all">Wszystkie</button>
          <button class="filter-chip" data-filter="wege">🌱 Wegańskie</button>
          <button class="filter-chip" data-filter="gf">🌾 Bezglutenowe</button>
          <button class="filter-chip" data-filter="spicy">🌶️ Pikantne</button>
        </div>

        <div id="widgetLoading" style="text-align:center; padding:20px; opacity:0.5;">Ładowanie...</div>
        <div id="widgetList"></div>
      </div>
      
      <div>
        <a href="#" id="fullMenuLink" target="_blank" class="btn-full-menu" style="display:none;">Zobacz pełne menu</a>
        <div class="widget-footer">
          Powered by <a href="https://snapmenu.getsnap.space" target="_blank">SnapMenu</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/widget.js"></script>
  </body>
</html>
