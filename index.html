<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapMenu - Cyfrowe Menu Premium | Skanuj Kod QR</title>
    <meta name="description" content="Zastąp tradycyjne menu nowoczesnym kodem QR. Darmowe cyfrowe menu dla restauracji i kawiarni od Snap Code Studio. Łatwe zarządzanie w czasie rzeczywistym." />
    <meta name="keywords" content="SnapMenu, Cyfrowe Menu, Menu QR, menu dla restauracji, kawiarnia menu, Snap Code Studio, darmowe menu online, e-menu, wirtualne menu" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SnapMenu" />
    <meta property="og:title" content="SnapMenu - Cyfrowe Menu Premium" />
    <meta property="og:description" content="Bezbłędnie zaprojektowane, ultra-szybkie cyfrowe menu dla restauracji i kawiarni. Całkowicie za darmo." />
    <meta property="og:url" content="https://menu.getsnap.space/" />
    <meta property="og:image" content="https://getsnap.space/og-banner.jpg?v=3" />
    <meta property="og:image:alt" content="SnapMenu Banner" />
    <meta property="og:locale" content="pl_PL" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@snapcodestudio" />
    <meta name="twitter:title" content="SnapMenu - Cyfrowe Menu Premium" />
    <meta name="twitter:description" content="Bezbłędnie zaprojektowane cyfrowe menu dla restauracji. Całkowicie za darmo." />
    <meta name="twitter:image" content="https://getsnap.space/og-banner.jpg?v=3" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://menu.getsnap.space/" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <h1 style="position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0;">SnapMenu - Darmowe Cyfrowe Menu dla Restauracji i Kawiarni</h1>
    <nav>
      <div class="navbar__bar glass animate-fade-up" style="animation-delay: 0.1s;">
        <div class="logo-wrap">
          <img src="/logo.webp" alt="Logo" class="logo-img" onerror="this.style.display='none'">
          SnapMenu
        </div>
        <button id="navLogoutBtn" class="btn btn-secondary hidden" style="width:auto; padding: 6px 16px; font-size:13px;">Wyloguj</button>
      </div>
    </nav>

    <div class="container hero" id="landingSection">
      <div class="hero-content animate-fade-up" style="animation-delay: 0.2s; display: flex; flex-direction: column; gap: 2rem;">
        <div>
          <h1>Cyfrowe Menu.<br>Design klasy<br>Premium.</h1>
          <p style="font-size: 1.1rem; margin-top: 1rem; max-width: 400px; color: var(--text-secondary);">Zarządzaj menu i swoim wizerunkiem w eleganckim, błyskawicznym formacie.</p>
        </div>
        
        <div class="hero-graphic glass anim-wiggle" style="position: relative; width: 100%; max-width: 320px; padding: 25px 20px; border-radius: 24px; display: flex; flex-direction: column; gap: 12px; border: 1px solid rgba(255,255,255,0.15); overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
           <div style="position: absolute; top: 0; left: 0; right: 0; height: 100%; background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%); z-index: 0;"></div>
           
           <div style="z-index: 1; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
             <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #10b981, #3b82f6); border: 1px solid rgba(255,255,255,0.2);"></div>
             <div style="width: 80px; height: 12px; border-radius: 6px; background: rgba(255,255,255,0.2);"></div>
           </div>
           
           <div style="z-index: 1; width: 100%; height: 80px; border-radius: 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05);"></div>
           
           <div style="z-index: 1; display: flex; gap: 10px;">
             <div style="width: 50%; height: 60px; border-radius: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05);"></div>
             <div style="width: 50%; height: 60px; border-radius: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05);"></div>
           </div>
           
           <div style="z-index: 1; width: 100%; height: 45px; border-radius: 12px; background: rgba(255,255,255,0.05);"></div>
           
           <div class="anim-pulse" style="position: absolute; bottom: -20%; left: -20%; width: 150px; height: 150px; background: #10b981; filter: blur(60px); opacity: 0.3; z-index: 0;"></div>
           <div class="anim-pulse" style="position: absolute; top: -10%; right: -20%; width: 120px; height: 120px; background: #3b82f6; filter: blur(50px); opacity: 0.3; z-index: 0; animation-delay: 1s;"></div>
        </div>
      </div>

      <div class="auth-box card animate-fade-up" style="animation-delay: 0.3s;">
        <h2 id="authTitle" style="margin-bottom: 1.5rem;">Zaloguj się</h2>
        <form id="authForm">
          <input type="email" id="email" placeholder="Adres e-mail" required />
          <input type="password" id="password" placeholder="Hasło" required />
          <div id="forgotPasswordWrap" style="text-align: right; margin-top: -4px; margin-bottom: 12px;">
            <a href="#" id="forgotPasswordBtn" style="color:var(--text-secondary); text-decoration:none; font-size:0.85rem; transition: color 0.2s;">Zapomniałeś hasła?</a>
          </div>
          <button type="submit" class="btn btn-primary" id="authSubmitBtn">Rozpocznij</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem;">
          <a href="#" id="toggleAuthMode" style="color:var(--text-secondary); text-decoration:none; font-weight:500; transition: color 0.2s;">
            Nie masz konta? Zarejestruj się
          </a>
        </p>
        <div id="authError" style="color:#ff453a; text-align:center; margin-top:1rem; font-size:0.9rem;"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
